name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6

      - name: pnpm install
        run: pnpm install

      - name: pnpm run lint
        run: pnpm run lint

      - name: pnpm run test
        run: pnpm run test

      - name: pnpm run collect
        run: pnpm run collect

      - name: pnpm run build
        run: pnpm run build
