name: Collect

on:
  schedule:
    - cron: "12 5 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6

      - name: pnpm install
        run: pnpm install

      - name: pnpm run collect
        run: pnpm run collect

      - uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actions
          message: updated the data
